name: build

# Standard `build` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# build sdist (`uv build --sdist`), `twine check --strict`,
# clean-venv smoke install via the sdist (compiles from source on the
# CI runner — exercises the Rust build path). Per-platform native
# wheels are produced by release.yml on tag.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build sdist
        run: uv build --sdist

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*.tar.gz

      - name: Smoke-test the sdist in a clean venv (compiles Rust)
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.tar.gz
          /tmp/smoke/bin/python -c "import kaos_nlp_transformers; print(kaos_nlp_transformers.__version__ if hasattr(kaos_nlp_transformers, '__version__') else 'imported')"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist-${{ github.sha }}
          path: dist/*.tar.gz
          retention-days: 7
