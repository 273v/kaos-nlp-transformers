name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ lint (Python + Rust) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Audit KNT-601 (0.2.0): hybrid Rust+Python build via maturin. Lint
  # both surfaces here so a Rust-only mistake (rustfmt drift, clippy
  # warning) fails fast without paying for a wheel build.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        # Lint the cdylib in release mode ‚Äî same profile as wheels and
        # release.yml's pre-publish QA. `--lib` so we don't try to compile
        # the criterion bench harness (it pulls heavy dev-dependencies
        # that aren't relevant to the lint signal).
        run: cargo clippy --release --lib -- -D warnings

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: lint-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (model2vec extra so ty resolves it)
        # ty type-checks every imported module; missing optional-extra
        # imports surface as `unresolved-import` even though the source
        # gates them behind `try: ... except ImportError`. Installing the
        # extras here keeps the source clean (no per-extra ignore comments
        # that would also need to fire under different installs).
        run: uv sync --group dev --extra model2vec --python 3.13

      - name: Build PyO3 extension (ty needs the cdylib to resolve _rust.*)
        # Without this step ty reports `unresolved-import` for every
        # `from kaos_nlp_transformers._rust import ...`. maturin develop
        # writes the compiled extension into the active venv's
        # site-packages so the Python tooling can find it.
        run: uv run maturin develop --release

      - name: Ruff format check
        run: uv run ruff format --check kaos_nlp_transformers/ tests/

      - name: Ruff lint
        run: uv run ruff check kaos_nlp_transformers/ tests/

      - name: Type check (ty)
        run: uv run ty check kaos_nlp_transformers/ tests/

  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ pre-commit ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        # pre-commit hooks include `cargo fmt` and `cargo clippy` since
        # the move to maturin; they need the toolchain on PATH.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: pre-commit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (model2vec extra so the ty hook resolves it)
        run: uv sync --group dev --extra model2vec --python 3.13

      - name: Build PyO3 extension
        run: uv run maturin develop --release

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ Rust unit tests (pure Rust core) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Covers rust/core/* modules without the PyO3 binding layer. Mirrors
  # kaos-nlp-core's rust-test job. Faster than the Python matrix and
  # gives independent signal on the Rust core when only the bindings
  # change (and vice versa).
  rust-test:
    name: Rust tests
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cargo test (release, lib only)
        # `--lib` excludes the criterion bench harness; release matches
        # the wheel build profile so optimization-level surprises (e.g.
        # debug-only assertions) surface here.
        run: cargo test --release --lib

  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ test (Python √ó maturin develop) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Linux x64 (self-hosted) keeps the full 4-Python-version matrix
    # for fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable.
    # Stable Linux entries gate PRs; experimental entries (3.14t
    # free-threaded, 3.15-dev pre-release, AND the cross-OS legs)
    # are informational only ‚Äî `continue-on-error` flips on
    # `experimental: true` so CI isn't blocked by upstream churn or
    # transient runner issues we can't fix.
    #
    # Pattern matches kaos-core / kaos-graph / kaos-nlp-core /
    # kaos-ml-core ci.yml. KNT-602 audit follow-up E4.
    strategy:
      fail-fast: false
      matrix:
        include:
          # ‚îÄ‚îÄ Linux x64 (self-hosted) ‚Äî full Python matrix ‚îÄ‚îÄ
          - python-version: "3.13"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          # Free-threaded build (PEP 703). Audit KNT-601 / KNT-602:
          # our cdylib declares `gil_used = false`, so this leg
          # exercises the actual GIL-disabled extension, not just
          # pure-Python imports.
          - python-version: "3.14t"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # Pre-release of 3.15 (expected GA October 2026).
          - python-version: "3.15"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # ‚îÄ‚îÄ macOS arm64 ‚Äî single Python smoke ‚îÄ‚îÄ
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          # ‚îÄ‚îÄ Windows x64 ‚Äî single Python smoke ‚îÄ‚îÄ
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      # PEP 540 UTF-8 Mode + stdout encoding override. Windows cp1252
      # default codepage crashes on Unicode stdout (`UnicodeEncodeError:
      # 'charmap' codec can't encode character ‚úì`) and on file opens
      # without explicit encoding= (`UnicodeDecodeError`). No-op on
      # Linux/macOS. Lessons from kaos-* family cross-OS work.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          # Per-leg cache key ‚Äî without this, all matrix legs race on
          # the same cache key and only the first wins, causing the
          # others to recompile heavy native deps (numpy on 3.14t /
          # 3.15) from source on every run.
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Build PyO3 extension (maturin develop --release)
        # KNT-601: the package is hybrid Rust+Python. The cdylib must
        # be compiled and installed into the venv before pytest can
        # import `kaos_nlp_transformers._rust`.
        run: uv run maturin develop --release

      - name: Run unit tests with coverage
        # `shell: bash` so the multi-line `\` continuations work on
        # Windows runners (default PowerShell parses `\` as a unary
        # operator and errors out). Git Bash is preinstalled on
        # `windows-latest`.
        shell: bash
        run: |
          uv run pytest tests/unit/ \
            -m "not live" \
            --cov=kaos_nlp_transformers \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ min-deps ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          # min-deps resolves with --resolution=lowest-direct, which
          # downloads materially different wheel versions than the
          # other 3.13 jobs. Separate cache so the two don't fight
          # over the same key.
          cache-suffix: min-deps-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Build PyO3 extension
        run: uv run maturin develop --release

      - name: Run unit tests
        # `-m "not live"` deselects @pytest.mark.live tests that
        # exercise real model downloads.
        run: |
          uv run pytest tests/unit/ \
            -m "not live" \
            --no-cov \
            -q

  # ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ build + wheel smoke test ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    # Build only depends on the fast quality gates (lint + pre-commit
    # + min-deps + rust-test), NOT the Python matrix. The matrix legs
    # verify our code runs under different interpreters; their
    # wall-clock time on experimental legs is dominated by transitive
    # native deps being source-built (numpy on 3.14t / 3.15). Gating
    # build on the slowest experimental compile would chain a wheel
    # build behind 25+ minutes of upstream source builds ‚Äî pure
    # friction. The matrix legs continue running informationally; the
    # experimental ones stay ``continue-on-error``.
    needs: [lint, pre-commit, min-deps, rust-test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: build-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        # `uv build` invokes the maturin backend declared in
        # pyproject.toml. On Linux x86_64 it produces a single abi3
        # wheel valid for CPython 3.13+ alongside the sdist. The
        # wheel matrix in release.yml builds the other 6 platforms;
        # this CI build is just a smoke for "the builder works" on
        # the release runner.
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into
        # a clean Python environment and exercise the public API.
        # This catches packaging bugs that source-tree tests miss:
        # missing data files, broken `__init__.py` exports, the cdylib
        # not being included in the wheel, py.typed marker not shipped,
        # etc.
        #
        # We DO download a real model in CI here ‚Äî the package is an
        # ML library; a smoke test that doesn't load and run a model
        # is documentation, not verification. BAAI/bge-small-en-v1.5
        # ONNX is ~30MiB, downloads in seconds, runs on CPU.
        # ``python-source = "."`` means ``kaos_nlp_transformers/`` lives at
        # the repo root. CPython's default ``sys.path[0] = cwd`` then
        # shadows the wheel install with the source tree, which only ships
        # ``_rust.pyi`` (a type stub, not importable) ‚Äî so
        # ``from kaos_nlp_transformers._rust import registry`` raises
        # ``ModuleNotFoundError`` even though the wheel is healthy.
        # ``PYTHONSAFEPATH=1`` (PEP 711) drops the implicit cwd entry, and
        # ``cd /tmp/smoke`` removes any other ambient relative-path hits.
        # Canonical pattern documented in
        # ``kaos-modules/docs/oss/40-ci-cd/hosted-runners.md``.
        env:
          PYTHONSAFEPATH: "1"
        run: |
          rm -rf /tmp/smoke
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python --reinstall dist/kaos_nlp_transformers-*.whl
          cd /tmp/smoke
          /tmp/smoke/bin/python -c "
          import numpy as np

          import kaos_nlp_transformers
          from kaos_nlp_transformers import (
              EmbeddingModel,
              EXCLUDED,
              KaosNLPTransformersSettings,
              REGISTRY,
              detect_devices,
          )

          # Version reachable.
          assert kaos_nlp_transformers.__version__, 'version missing from wheel'

          # Public surface imports without error and is non-trivial.
          assert len(kaos_nlp_transformers.__all__) >= 14, kaos_nlp_transformers.__all__

          # py.typed marker shipped.
          import importlib.resources as ir
          assert ir.files('kaos_nlp_transformers').joinpath('py.typed').is_file(), 'py.typed missing'

          # Rust cdylib reachable and reporting CPU capability.
          from kaos_nlp_transformers._rust import registry
          caps = registry.capabilities()
          assert caps['cpu'] is True, f'cpu cap missing: {caps}'

          # Registry has at least one license-vetted model and the EXCLUDED
          # list still names the known non-permissive ones.
          assert 'BAAI/bge-small-en-v1.5' in REGISTRY
          assert any(m.startswith('jinaai/') or 'NV-Embed' in m for m in EXCLUDED), EXCLUDED

          # Settings construct cleanly from an empty environment.
          s = KaosNLPTransformersSettings()
          assert s.default_model == 'BAAI/bge-small-en-v1.5'

          # Device detection runs and returns the expected dataclass.
          devs = detect_devices()
          assert hasattr(devs, 'devices') and hasattr(devs, 'best') and hasattr(devs, 'has_gpu')
          assert any(d.device == 'cpu' for d in devs.devices)

          # Real ML: load + embed + cosine similarity through the Rust ort backend.
          model = EmbeddingModel.load('BAAI/bge-small-en-v1.5')
          vecs = model.embed([
              'Force majeure clauses excuse performance.',
              'Indemnity caps the liability of the seller.',
          ])
          assert vecs.shape == (2, 384) and vecs.dtype == np.float32, vecs.shape

          n0 = vecs[0] / np.linalg.norm(vecs[0])
          n1 = vecs[1] / np.linalg.norm(vecs[1])
          sim = float(np.dot(n0, n1))
          assert 0.5 < sim < 0.8, f'unexpected sim for legal-pair: {sim}'

          # KNT-601 #2: token-aware API surface for downstream chunkers.
          assert isinstance(model.max_seq_len, int) and model.max_seq_len > 0
          counts = model.count_tokens(['hello world', 'a longer sentence here'])
          assert len(counts) == 2 and all(c > 0 for c in counts)

          print(f'kaos-nlp-transformers {kaos_nlp_transformers.__version__}: smoke OK (sim={sim:.3f})')
          "
          # Exercise both CLI entrypoints.
          /tmp/smoke/bin/kaos-nlp-transformers info --json
          /tmp/smoke/bin/kaos-nlp-transformers-serve --help || true

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
