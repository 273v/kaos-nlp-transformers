name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback so a failed publish (e.g. transient PyPI 5xx) can be
  # retried without re-tagging.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────── Pre-publish QA + sdist ──────────────
  # One job that gates everything else: verifies version sync, runs the
  # full QA gauntlet, builds + verifies the sdist (the format-agnostic
  # source artifact). Wheel-matrix jobs depend on this; if the source
  # tree is broken we never compile 7 wheels for nothing.
  #
  # Audit KNT-601 (0.2.0): this workflow replaces the prior
  # hatchling-based release. The package is now a hybrid Rust+Python
  # build via maturin; per-platform abi3 wheels.
  sdist:
    name: Build sdist + pre-publish QA
    runs-on: kaos-x64-16core
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (model2vec extra so ty resolves it)
        run: uv sync --group dev --extra model2vec --python 3.13

      - name: Verify Cargo.toml version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Cargo SemVer "0.2.0-alpha.1" maps to PEP 440 "0.2.0a1".
          CARGO_VERSION=$(awk -F\" '/^version = "/{print $2; exit}' Cargo.toml)
          # Normalize Cargo SemVer "X.Y.Z-alpha.N" -> PEP 440 "X.Y.ZaN" etc.
          PEP440_VERSION=$(echo "$CARGO_VERSION" \
            | sed -E 's/-alpha\.([0-9]+)$/a\1/' \
            | sed -E 's/-beta\.([0-9]+)$/b\1/' \
            | sed -E 's/-rc\.([0-9]+)$/rc\1/')
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PEP440_VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match Cargo.toml-derived PEP 440 version '$PEP440_VERSION' (Cargo SemVer '$CARGO_VERSION')"
            exit 1
          fi
          echo "version=$PEP440_VERSION" >> "$GITHUB_OUTPUT"
          echo "kaos-nlp-transformers release: tag=$TAG, cargo=$CARGO_VERSION, pep440=$PEP440_VERSION"

      - name: Pre-publish QA — Rust
        run: |
          cargo fmt --check
          cargo clippy --release --lib -- -D warnings
          cargo test --release --lib

      - name: Pre-publish QA — Python (build extension first)
        run: |
          uv run maturin develop --release
          uv run ruff format --check kaos_nlp_transformers tests scripts
          uv run ruff check kaos_nlp_transformers tests scripts
          uv run ty check kaos_nlp_transformers tests
          uv run pytest tests/unit -q --no-cov

      - name: Build sdist
        run: uv run maturin sdist --out dist

      - name: Verify sdist metadata
        run: uvx --from twine twine check --strict dist/*.tar.gz

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  # ────────────── Wheel matrix ──────────────
  # 5 wheels per release:
  #   - Linux x86_64 manylinux_2_28
  #   - Linux aarch64 manylinux_2_28
  #   - macOS arm64
  #   - Windows x86_64
  #   - Windows arm64
  #
  # musllinux is deliberately skipped (unlike kaos-nlp-core's 7-wheel
  # matrix): the ``ort`` Rust crate uses ``download-binaries`` to fetch
  # Microsoft's official ``libonnxruntime`` builds, and Microsoft only
  # publishes manylinux2014 variants — there is no musllinux build of
  # libonnxruntime to download. Alpine / musl users would need a
  # source-build wheel, which is out of scope at 0.2.0a1.
  #
  # macOS x86_64 deliberately skipped (Apple ended Intel sales in 2023).
  # GPU companion wheel ships as a separate distribution in 0.2.0a2.
  wheels:
    name: ${{ matrix.target }} ${{ matrix.linux-tag && '(' || '' }}${{ matrix.linux-tag }}${{ matrix.linux-tag && ')' || '' }}
    needs: sdist
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linux-tag: manylinux_2_28
            manylinux: "2_28"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            linux-tag: manylinux_2_28
            manylinux: "2_28"
          - os: macos-14
            target: aarch64-apple-darwin
            linux-tag: ""
            manylinux: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            linux-tag: ""
            manylinux: ""
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            linux-tag: ""
            manylinux: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python (host)
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel via PyO3/maturin-action
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # Empty for macOS/Windows; "2_28" or "musllinux_1_2" for Linux.
          manylinux: ${{ matrix.manylinux }}
          args: --release --strip --out dist
          # Don't restore from cache — release builds must be reproducible
          # from a clean state.
          rust-toolchain: stable
          sccache: "true"

      - name: Smoke test the wheel
        # Runs on EVERY built wheel (linux-x64, linux-aarch64,
        # macos-arm64, windows-x64, windows-arm64). Each leg's runner
        # IS the target platform, so importing the just-built wheel
        # exercises the cdylib on its actual native ABI. Catches:
        # libonnxruntime symbol mismatches on macOS or Windows,
        # PE/ELF/Mach-O dynamic-linker issues, native-dependency
        # version skew. The publish-pypi job needs all wheels to pass
        # before it gates `if: startsWith(github.ref, 'refs/tags/v')`.
        #
        # `shell: bash` so multi-line `\` continuations and `[[ ... ]]`
        # work on the Windows runners (Git Bash is preinstalled).
        # PYTHONUTF8=1 + PYTHONIOENCODING handle the Windows cp1252
        # default codepage that crashes on Unicode stdout (lessons
        # carried over from the kaos-* family ci.yml cross-OS work).
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        # The smoke is intentionally minimal — verify the top-level
        # package imports cleanly. Reaching into `_rust.<submodule>`
        # from a one-liner is fragile because the smoke env's installed
        # package layout has both `_rust.abi3.so` (the cdylib) and
        # `_rust/*.pyi` (type stubs) under the same directory, and
        # CPython's namespace-package detector can resolve the first
        # lookup ambiguously on some runners. The full Python test
        # suite (test job in ci.yml) exercises every `_rust.<submodule>`
        # import end-to-end via pytest after maturin develop, which is
        # the authoritative check.
        run: |
          # Portable venv-binary detection: Unix-style `bin/`, Windows-style
          # `Scripts/`. Bash on Git for Windows respects the latter even
          # though it accepts `/` separators.
          python -m venv .smoke-venv
          if [[ -f .smoke-venv/bin/python ]]; then
            PY=".smoke-venv/bin/python"
          else
            PY=".smoke-venv/Scripts/python"
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" -c "
          import kaos_nlp_transformers as k
          assert k.__version__, 'version missing from wheel'
          # Sanity-check the public surface — the top-level imports
          # in __init__.py succeeded only if the cdylib loaded too,
          # because EmbeddingModel / CrossEncoderReranker / device
          # detection all transitively touch the Rust extension's
          # registered submodules.
          from kaos_nlp_transformers import (
              EmbeddingModel,
              EXCLUDED,
              KaosNLPTransformersSettings,
              REGISTRY,
              detect_devices,
          )
          devs = detect_devices()
          assert any(d.device == 'cpu' for d in devs.devices)
          print(f'kaos-nlp-transformers {k.__version__}: smoke OK ({len(REGISTRY)} models registered)')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.linux-tag || matrix.os }}
          path: dist/*.whl
          retention-days: 30

  # ────────────── Publish to PyPI via OIDC ──────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: kaos-x64-16core
    environment:
      name: pypi
      url: https://pypi.org/p/kaos-nlp-transformers
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Show artifact set
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: false

  # ────────────── GitHub Release ──────────────
  github-release:
    name: Create GitHub Release
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: kaos-x64-16core
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "kaos-nlp-transformers $VERSION" \
            --notes-from-tag \
            $PRERELEASE_FLAG \
            dist/*
