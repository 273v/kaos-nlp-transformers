name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 02:00 UTC — re-scan in case a new CVE landed against
    # an existing pinned dependency.
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── gitleaks (CLI, license-free) ──────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks (Docker, no license required)
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:latest detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  # ────────────── pip-audit ──────────────
  pip-audit:
    name: pip-audit (Python dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export installed dependency set to requirements.txt
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit (uvx — uses our 3.13 toolchain)
        # Direct invocation instead of pypa/gh-action-pip-audit because the
        # action's internal venv picks a Python that can't resolve packages
        # requiring Python >= 3.13 (e.g. kaos-core>=0.1.0a1, a dev dep).
        # uvx honors the --python we already installed above.
        run: |
          uvx --python 3.13 --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict

  # ────────────── cargo-audit ──────────────
  # Scan Cargo.lock against the RustSec advisory database (different
  # source than cargo-deny's mirror; we run both for belt-and-suspenders
  # coverage — cargo-audit picks up advisories that haven't propagated
  # to cargo-deny's checked-in db yet).
  cargo-audit:
    name: cargo-audit (Rust CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ────────────── cargo-deny ──────────────
  # License allowlist + advisory checks + crate ban list (per deny.toml).
  cargo-deny:
    name: cargo-deny (licenses + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Default: runs `cargo deny check` covering advisories, bans,
          # licenses, sources, per the deny.toml shipped at repo root.
          rust-version: stable
