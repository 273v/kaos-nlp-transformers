# cargo-deny configuration for kaos-nlp-transformers.
# Mirrors kaos-nlp-core/deny.toml. Per docs/MIGRATION_0_2_0.md §13 and
# the audit-A2-#9 supply-chain policy.

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # RUSTSEC-2024-0436: ``paste 1.0.15`` is unmaintained (author
  # archived the repo; suggested replacements are ``pastey`` or
  # ``with_builtin_macros``). We pull it transitively via
  #
  #     paste 1.0.15
  #       ├── macro_rules_attribute 0.2.2
  #       │   └── tokenizers 0.22.2 (direct dep)
  #       └── tokenizers 0.22.2 (*)
  #
  # ``paste`` is a proc-macro crate — it expands at compile time,
  # ships nothing into the wheel at runtime, and has no known
  # correctness or security defects. The audit-KNT-601 §15
  # (MIGRATION_0_2_0.md) comment block already acknowledged this
  # advisory but left the ``ignore`` list empty, so ``cargo-deny``
  # failed on every CI run. Make the acknowledgement load-bearing.
  # Drop this ignore once ``tokenizers`` migrates off ``paste``
  # (track via https://github.com/huggingface/tokenizers).
  "RUSTSEC-2024-0436",
]

[licenses]
# cargo-deny v0.18 removed the legacy ``allow-osi-fsf-free`` knob; the
# allowlist below is the single source of truth.
#
# Audit KNT-601: the dep tree includes the ICU4X family (icu_*, tinystr,
# yoke, zerovec — Unicode-3.0 license) pulled via tokenizers' regex/idna
# chain. Unicode-3.0 is permissive and OSI-approved; explicitly allowed
# below.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "0BSD",
  "CDLA-Permissive-2.0",  # webpki-roots Mozilla CA bundle re-export
]
exceptions = []
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # bincode 1.x is unmaintained per RUSTSEC-2025-0141 (mirrors
  # kaos-nlp-core's policy).
  { name = "bincode", version = "<2.0.0" },
]
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
